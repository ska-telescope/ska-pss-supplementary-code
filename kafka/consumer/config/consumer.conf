# Broker
bootstrap.servers = localhost:9092
topic             = pss-single-pulse-candidates

# Consumer group (AT4-2179 section 6 placeholder; confirm with SDP)
group.id          = cg-pss

# At-least-once: manual commits, earliest start for fresh groups
enable.auto.commit = false
auto.offset.reset  = earliest

# librdkafka tuning
session.timeout.ms     = 10000
max.poll.interval.ms   = 300000
fetch.max.bytes        = 4194304
message.max.bytes      = 4194304

# Handler (module:callable). Default logs each message at DEBUG.
handler = pss_sdp_consumer.handlers:log_handler

# Throughput logger cadence in seconds. 0 disables periodic logging.
metrics.interval_s = 10
